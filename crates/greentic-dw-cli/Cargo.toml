[package]
name = "greentic-dw-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "CLI and wizard contract surface for greentic-dw."
readme = "README.md"
repository.workspace = true

[dependencies]
anyhow = "1"
async-nats = "0.46"
clap = { workspace = true }
greentic-cap-types = { workspace = true }
greentic-dw-authoring = { git = "https://github.com/greenticai/greentic-dw-authoring", rev = "645980b7872fccf8c765bbc6011867f1b6aecdef" }
greentic-dw-core = { workspace = true }
greentic-dw-engine = { workspace = true }
greentic-dw-manifest = { workspace = true }
greentic-dw-operala-bridge = { path = "../greentic-dw-operala-bridge" }
greentic-dw-operala-invoker = { path = "../greentic-dw-operala-invoker" }
greentic-dw-runtime = { workspace = true }
greentic-dw-types = { workspace = true }
greentic-llm = { git = "https://github.com/greenticai/greentic-llm", tag = "v1.3.0-research.0" }
pdf-extract = "0.7"
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_bw = "2"
thiserror = { workspace = true }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "signal", "net", "io-util"] }
tracing = "0.1"
tracing-subscriber = "0.3"
ureq = { workspace = true }

[dev-dependencies]
async-trait = "0.1"
futures-util = "0.3"
greentic-dw-planning = { path = "../greentic-dw-planning" }
greentic-dw-reflection = { path = "../greentic-dw-reflection" }
greentic-extension-sdk-contract = { workspace = true }
greentic-types = "=1.3.0-research.0"
tempfile = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
zip = "2"
