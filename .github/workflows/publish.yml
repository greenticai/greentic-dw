name: Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag in the format vX.Y.Z'
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "greentic-dw") | .version' | head -n 1)"
          if [ -z "$version" ]; then
            echo "Unable to determine package version from Cargo metadata"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve tag to validate
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo.toml version
        if: github.event_name != 'push' || github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="v${{ steps.version.outputs.version }}"
          actual_tag="${{ steps.tag.outputs.tag }}"
          if [ "$expected_tag" != "$actual_tag" ]; then
            echo "Tag/version mismatch"
            echo "Expected: $expected_tag"
            echo "Actual:   $actual_tag"
            exit 1
          fi

  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main

  publish-crates:
    needs:
      - verify-version
      - ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Missing CARGO_REGISTRY_TOKEN secret"
            exit 1
          fi

          mapfile -t crates < <(python3 ci/publish_order.py)

          if [ "${#crates[@]}" -eq 0 ]; then
            echo "No publishable crates found."
            exit 0
          fi

          for crate in "${crates[@]}"; do
            echo "Publishing $crate"
            attempt=1
            while true; do
              if cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"; then
                break
              fi

              if [ "$attempt" -ge 3 ]; then
                echo "Failed to publish $crate after $attempt attempts"
                exit 1
              fi

              sleep_for=$((attempt * 15))
              echo "Retrying $crate in ${sleep_for}s (attempt $((attempt + 1))/3)..."
              sleep "$sleep_for"
              attempt=$((attempt + 1))
            done

            # crates.io index propagation delay between dependent crates.
            sleep 30
          done

  build-cli-artifacts:
    needs:
      - verify-version
      - ci
    if: github.event_name != 'push' || github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-2022
            target: i686-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          target: ${{ matrix.target }}

      - name: Install musl linker support
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.verify-version.outputs.version }}"
          target="${{ matrix.target }}"
          bin_name="greentic-dw"
          archive_ext="${{ matrix.archive_ext }}"
          bin_path="target/${target}/release/${bin_name}"

          if [[ "$target" == *"windows"* ]]; then
            bin_path="${bin_path}.exe"
          fi

          if [ ! -f "$bin_path" ]; then
            echo "missing binary: $bin_path"
            exit 1
          fi

          out_dir="dist/${target}"
          mkdir -p "$out_dir"

          if [ "$archive_ext" = "zip" ]; then
            cp "$bin_path" "${out_dir}/${bin_name}.exe"
            if command -v zip >/dev/null 2>&1; then
              (cd "$out_dir" && zip -q "${bin_name}-v${version}-${target}.zip" "${bin_name}.exe")
            else
              powershell -Command "Compress-Archive -Path '${out_dir}/${bin_name}.exe' -DestinationPath '${out_dir}/${bin_name}-v${version}-${target}.zip' -Force"
            fi
          else
            cp "$bin_path" "${out_dir}/${bin_name}"
            tar -C "$out_dir" -czf "${out_dir}/${bin_name}-v${version}-${target}.tar.gz" "${bin_name}"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$out_dir" && sha256sum *."${archive_ext}" > checksums.txt)
          else
            (cd "$out_dir" && shasum -a 256 *."${archive_ext}" > checksums.txt)
          fi

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  create-release:
    needs:
      - verify-version
      - publish-crates
      - build-cli-artifacts
    if: github.event_name != 'push' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          name: Release ${{ needs.verify-version.outputs.tag }}
          generate_release_notes: true
          files: dist/**/*
