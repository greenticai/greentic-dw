name: Perf (lightweight)
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A (heavy-job sweep). Manual runs remain via workflow_dispatch. push
# trigger preserved so main-merge still catches regressions immediately.

on:
  schedule:
    - cron: "4 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests (including perf guards)
        run: cargo test --all --all-features

      - name: Run benchmarks (smoke)
        run: cargo bench --bench perf -- --sample-size 10
