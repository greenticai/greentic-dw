name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/_reusable_rust.yml
    with:
      commands: |
        cargo fmt --all -- --check
        cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    uses: ./.github/workflows/_reusable_rust.yml
    with:
      commands: |
        cargo test --workspace --all-features

  package-dry-run:
    uses: ./.github/workflows/_reusable_rust.yml
    with:
      commands: |
        bash ci/local_check.sh package-only
