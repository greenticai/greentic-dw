name: Nightly Coverage

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage-policy:
    uses: ./.github/workflows/_reusable_rust.yml
    with:
      install_binstall: true
      binstall_crates: greentic-dev cargo-nextest cargo-llvm-cov
      commands: |
        greentic-dev coverage
