name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-dw
      binary: greentic-dw
      extra-files: |
        README.md
        LICENSE
    secrets: inherit

  publish_crates:
    name: Publish to crates.io
    needs: [release]
    permissions:
      contents: read
    uses: greenticai/.github/.github/workflows/crates-publish.yml@main
    with:
      crates: "greentic-dw-context greentic-dw-delegation greentic-dw-planning greentic-dw-reflection greentic-dw-types greentic-dw-manifest greentic-dw-core greentic-dw-engine greentic-dw-pack greentic-dw-workspace greentic-dw-runtime greentic-dw-cli"
    secrets: inherit
