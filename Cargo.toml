[workspace]
members = [
    ".",
    "crates/greentic-dw-cli",
    "crates/greentic-dw-types",
    "crates/greentic-dw-manifest",
    "crates/greentic-dw-core",
    "crates/greentic-dw-runtime",
    "crates/greentic-dw-engine",
    "crates/greentic-dw-pack",
    "crates/greentic-dw-testing",
]
resolver = "2"

[workspace.package]
version = "0.5.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
repository = "https://github.com/greenticai/greentic-dw"

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
criterion = "0.5"
greentic-dw-cli = { path = "crates/greentic-dw-cli" }
greentic-dw-core = { path = "crates/greentic-dw-core" }
greentic-dw-engine = { path = "crates/greentic-dw-engine" }
greentic-dw-manifest = { path = "crates/greentic-dw-manifest" }
greentic-dw-pack = { path = "crates/greentic-dw-pack" }
greentic-dw-runtime = { path = "crates/greentic-dw-runtime" }
greentic-dw-testing = { path = "crates/greentic-dw-testing" }
greentic-dw-types = { path = "crates/greentic-dw-types" }
greentic-cap-core = { path = "../greentic-cap/crates/greentic-cap-core" }
greentic-cap-profile = { path = "../greentic-cap/crates/greentic-cap-profile" }
greentic-cap-resolver = { path = "../greentic-cap/crates/greentic-cap-resolver" }
greentic-cap-schema = { path = "../greentic-cap/crates/greentic-cap-schema" }
greentic-cap-types = { path = "../greentic-cap/crates/greentic-cap-types" }
schemars = { version = "0.8", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "1"
ureq = { version = "2", default-features = false, features = ["tls"] }

[package]
name = "greentic-dw"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Greentic data workspace command-line entrypoint."
readme = "README.md"
repository = "https://github.com/greenticai/greentic-dw"
homepage = "https://github.com/greenticai/greentic-dw"
documentation = "https://docs.rs/greentic-dw"
keywords = ["greentic", "data", "workspace"]
categories = ["command-line-utilities"]
include = [
    "src/**",
    "crates/**",
    "tools/**",
    "ci/**",
    ".github/workflows/**",
    "Cargo.toml",
    "README.md",
    "LICENSE",
]

[dependencies]
greentic-dw-cli = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
greentic-cap-types = { workspace = true }
greentic-dw-core = { workspace = true }
greentic-dw-engine = { workspace = true }
greentic-dw-manifest = { workspace = true }
greentic-dw-runtime = { workspace = true }
greentic-dw-types = { workspace = true }

[[bench]]
name = "perf"
harness = false
